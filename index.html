<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Momentum</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="app">
    <header>
        <h1>Momentum</h1>
        <p id="today"></p>
    </header>

    <!-- ===== HOJE ===== -->
    <main id="view-hoje" class="view active">
        <section class="card">
            <h2>🎯 Foco do dia</h2>
            <input
                type="text"
                id="focus"
                placeholder="Qual é o objetivo principal de hoje?">
        </section>
        <section class="card">
            <h2>📈 Progresso do dia</h2>
            <div class="progress">
                <div id="progressBar"></div>
            </div>
            <p id="progressText">0%</p>
        </section>
        <section class="card">
            <h2>✅ Tarefas</h2>
            <div id="tasks"></div>
            <button id="addTask">+ Nova tarefa</button>
        </section>
    </main>

    <!-- ===== SEMANA ===== -->
    <main id="view-semana" class="view">
        <section class="card">
            <h2>📅 Acompanhamento semanal</h2>
            <div class="day-pills" id="dayPills"></div>
            <div id="weekChecklist"></div>
        </section>
        <section class="card">
            <h2>📊 Resumo da semana</h2>
            <div class="bars" id="weekBars"></div>
            <p id="weekTotal" class="week-total">0 min cumpridos</p>
        </section>
    </main>

    <!-- ===== ESTUDOS ===== -->
    <main id="view-estudos" class="view">
        <section class="card">
            <h2>📚 Rotina do dia</h2>
            <div class="timeline" id="timeline"></div>
        </section>
    </main>

    <!-- ===== PROJETOS ===== -->
    <main id="view-projetos" class="view">
        <section class="card">
            <h2>📁 Projetos</h2>
            <div id="projectTasks"></div>
            <button id="addProjectTask">+ Novo item</button>
        </section>
    </main>

    <footer>
        <div class="tab active" data-view="hoje">🏠 Hoje</div>
        <div class="tab" data-view="semana">📅 Semana</div>
        <div class="tab" data-view="estudos">📚 Estudos</div>
        <div class="tab" data-view="projetos">📁 Projetos</div>
    </footer>
</div>
<script src="js/storage.js"></script>
<script src="js/app.js"></script>
</body>
</html>
